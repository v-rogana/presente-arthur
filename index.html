<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador: Um Dia na Vida do Arthur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
  min-height: 100vh;
  font-family: 'DM Sans', system-ui, -apple-system, 'Segoe UI', sans-serif;
  color: #e2e8f0;
  display: flex;
  justify-content: center;
  padding: 16px;
  overflow-x: hidden;
}

#app {
  width: 100%;
  max-width: 520px;
  padding-bottom: 40px;
}

/* STATS BAR */
#stats-bar {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(15, 23, 42, 0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  border-radius: 0 0 16px 16px;
  padding: 12px 16px;
  margin-bottom: 20px;
  display: none;
  gap: 6px;
  flex-wrap: wrap;
}

#stats-bar.visible {
  display: flex;
}

.stat {
  flex: 1 1 45%;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 500;
  padding: 6px 10px;
  border-radius: 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  transition: background 0.3s, border-color 0.3s;
}

.stat .stat-icon { font-size: 18px; }
.stat .stat-label { color: #94a3b8; font-size: 11px; }
.stat .stat-value { margin-left: auto; font-weight: 700; font-size: 15px; color: #818cf8; }

.stat.flash-up { background: rgba(74, 222, 128, 0.15); border-color: rgba(74, 222, 128, 0.4); }
.stat.flash-down { background: rgba(248, 113, 113, 0.15); border-color: rgba(248, 113, 113, 0.4); }

/* SCENE CARD */
.scene-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 28px 22px;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.scene-emoji {
  font-size: 52px;
  text-align: center;
  margin-bottom: 16px;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}

.scene-title {
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  font-size: 20px;
  text-align: center;
  margin-bottom: 6px;
  color: #e2e8f0;
}

.scene-subtitle {
  text-align: center;
  color: #818cf8;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 2px;
  font-weight: 600;
  margin-bottom: 20px;
}

.scene-text {
  font-size: 15px;
  line-height: 1.7;
  color: #cbd5e1;
  margin-bottom: 24px;
  min-height: 60px;
  white-space: pre-line;
  cursor: pointer;
}

.scene-text .cursor {
  display: inline;
  color: #818cf8;
  animation: blink 0.6s step-end infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* CHOICES */
.choices { display: flex; flex-direction: column; gap: 10px; }

.choice-btn {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 14px 18px;
  color: #e2e8f0;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  text-align: left;
  cursor: pointer;
  transition: all 0.25s ease;
  opacity: 0;
  transform: translateY(12px);
}

.choice-btn.show {
  opacity: 1;
  transform: translateY(0);
}

.choice-btn:hover, .choice-btn:focus {
  transform: translateX(6px);
  border-color: #818cf8;
  background: rgba(129, 140, 248, 0.1);
}

.choice-btn:active {
  transform: translateX(6px) scale(0.98);
}

/* INTRO SPECIAL */
.intro-btn {
  display: block;
  margin: 0 auto;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  border: none;
  border-radius: 14px;
  padding: 16px 32px;
  color: #fff;
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.3s ease;
  opacity: 0;
  transform: translateY(12px);
}

.intro-btn.show {
  opacity: 1;
  transform: translateY(0);
}

.intro-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(99, 102, 241, 0.4);
}

/* NOTIFICATIONS */
#notification-area {
  position: fixed;
  top: 12px;
  right: 12px;
  z-index: 100;
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-width: 280px;
}

.notification {
  background: rgba(30, 27, 75, 0.95);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 13px;
  color: #e2e8f0;
  animation: slideIn 0.35s ease, fadeOut 0.4s ease 2.2s forwards;
  display: flex;
  align-items: center;
  gap: 8px;
}

.notification .notif-icon { font-size: 20px; }
.notification .notif-text { line-height: 1.3; }
.notification .notif-app { font-size: 10px; color: #94a3b8; display: block; }

@keyframes slideIn {
  from { opacity: 0; transform: translateX(100px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes fadeOut {
  from { opacity: 1; }
  to { opacity: 0; pointer-events: none; }
}

/* FINAL SCREEN */
.final-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin: 20px 0;
}

.final-stat {
  flex: 1 1 45%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 14px;
  text-align: center;
}

.final-stat .fs-icon { font-size: 28px; }
.final-stat .fs-label { font-size: 11px; color: #94a3b8; margin: 4px 0; }
.final-stat .fs-value { font-size: 22px; font-weight: 700; color: #818cf8; }

.extra-stats {
  background: rgba(255,255,255,0.03);
  border-radius: 12px;
  padding: 16px;
  margin: 16px 0;
  font-size: 13px;
  color: #94a3b8;
  line-height: 1.8;
}

.rank-emoji { font-size: 64px; text-align: center; margin-bottom: 8px; }
.rank-title {
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  font-size: 22px;
  text-align: center;
  margin-bottom: 4px;
}
.rank-subtitle {
  text-align: center;
  color: #94a3b8;
  font-size: 13px;
  margin-bottom: 20px;
}

/* BIRTHDAY CARD */
.confetti-container {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 200;
  overflow: hidden;
}

.confetti-piece {
  position: absolute;
  top: -40px;
  font-size: 24px;
  animation: confettiFall linear infinite;
}

@keyframes confettiFall {
  0% { transform: translateY(-40px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0.6; }

.birthday-msg {
  background: rgba(255,255,255,0.04);

  border-radius: 16px;

  font-size: 14px;

.birthday-msg p { margin-bottom: 12px; }

.replay-btn {

  padding: 14px 28px;
  color: #e2e8f0;

.replay-btn:hover {

  background: rgba(129, 140, 248, 0.1);

</style>

function showNotification() {
  const n = notifications[Math.floor(Math.random() * notifications.length)];
  const area = document.getElementById('notification-area');
  const el = document.createElement('div');
  el.className = 'notification';
  el.innerHTML = `<span class="notif-icon">${n.icon}</span><span class="notif-text"><span class="notif-app">${n.app}</span>${n.text}</span>`;
  area.appendChild(el);
  setTimeout(() => el.remove(), 2800);
}

function changeStat(key, delta) {
  stats[key] += delta;
  const valEl = document.getElementById('val-' + key);
  const statEl = document.getElementById('stat-' + key);
  valEl.textContent = stats[key];
  const cls = delta > 0 && (key === 'stress' || key === 'coffee') ? 'flash-down'
            : delta < 0 && (key === 'stress' || key === 'coffee') ? 'flash-up'
            : delta > 0 ? 'flash-up' : 'flash-down';
  statEl.classList.add(cls);
  setTimeout(() => statEl.classList.remove(cls), 600);
}

function applyEffects(effects) {
  if (!effects) return;
  for (const [key, val] of Object.entries(effects)) {
    changeStat(key, val);
  }
}

function typewriter(el, text, cb) {
  let i = 0;
  let skipped = false;
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  cursor.textContent = '▊';

  function type() {
    if (skipped) return;
    if (i < text.length) {
      el.textContent = text.slice(0, i + 1);
      el.appendChild(cursor);
      i++;
      typewriterTimer = setTimeout(type, 14);
    } else {
      cursor.remove();
      if (cb) cb();
    }
  }

  function skip() {
    skipped = true;
    clearTimeout(typewriterTimer);
    el.textContent = text;
    cursor.remove();
    el.removeEventListener('click', skip);
    if (cb) cb();
  }

  el.addEventListener('click', skip);
  type();
}

function showChoices(container, choices) {
  const wrap = document.createElement('div');
  wrap.className = 'choices';
  choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.label;
    btn.onclick = () => {
      applyEffects(c.effects);
      if (c.next) {
        renderScene(c.next);
      }
    };
    wrap.appendChild(btn);
    setTimeout(() => btn.classList.add('show'), 80 * (i + 1));
  });
  container.appendChild(wrap);
}

function renderScene(sceneId) {
  currentScene = sceneId;
  sceneCount++;
  const scene = scenes[sceneId];
  const container = document.getElementById('scene-container');
  const statsBar = document.getElementById('stats-bar');

  if (sceneId === 'results') { renderResults(); return; }

  if (scene.showStats === false) {
    statsBar.classList.remove('visible');
  } else {
    statsBar.classList.add('visible');
  }

  // Notifications every 2-3 scenes (not on intro or results)
  if (sceneCount > 2 && sceneCount % 2 === 0) {
    setTimeout(showNotification, 800 + Math.random() * 1500);
  }

  container.innerHTML = '';
  const card = document.createElement('div');
  card.className = 'scene-card';

  const emojiEl = document.createElement('div');
  emojiEl.className = 'scene-emoji';
  emojiEl.textContent = scene.emoji;
  card.appendChild(emojiEl);

  const titleEl = document.createElement('div');
  titleEl.className = 'scene-title';
  titleEl.textContent = scene.title;
  card.appendChild(titleEl);

  if (scene.subtitle) {
    const subEl = document.createElement('div');
    subEl.className = 'scene-subtitle';
    subEl.textContent = scene.subtitle;
    card.appendChild(subEl);
  }

  const textEl = document.createElement('div');
  textEl.className = 'scene-text';
  card.appendChild(textEl);

  container.appendChild(card);

  typewriter(textEl, scene.text, () => {
    if (scene.introBtn) {
      const btn = document.createElement('button');
      btn.className = 'intro-btn';
      btn.textContent = '▶ INICIAR SIMULAÇÃO';
      btn.onclick = () => renderScene(scene.next);
      card.appendChild(btn);
      setTimeout(() => btn.classList.add('show'), 100);
    } else if (scene.choices) {
      showChoices(card, scene.choices);
    }
  });
}

function renderResults() {
  document.getElementById('stats-bar').classList.remove('visible');
  const container = document.getElementById('scene-container');

  const score = stats.dignity + stats.luisa - stats.stress - stats.coffee;
  let rankEmoji, rankTitle;
  if (score <= -20) { rankEmoji = '💀'; rankTitle = 'Desastre Ambulante'; }
  else if (score <= -10) { rankEmoji = '🩹'; rankTitle = 'Sobrevivente Acidental'; }
  else if (score <= -3) { rankEmoji = '😅'; rankTitle = 'Arthur Médio'; }
  else if (score <= 2) { rankEmoji = '⭐'; rankTitle = 'Arthur Premium'; }
  else { rankEmoji = '👑'; rankTitle = 'Arthur Lendário'; }

  container.innerHTML = `
    <div class="scene-card">
      <div class="rank-emoji">${rankEmoji}</div>
      <div class="rank-title">${rankTitle}</div>
      <div class="rank-subtitle">Score total: ${score}</div>
      <div class="final-stats">
        <div class="final-stat"><div class="fs-icon">😰</div><div class="fs-label">Estresse</div><div class="fs-value">${stats.stress}</div></div>
        <div class="final-stat"><div class="fs-icon">☕</div><div class="fs-label">Borras de Café</div><div class="fs-value">${stats.coffee}</div></div>
        <div class="final-stat"><div class="fs-icon">💍</div><div class="fs-label">Humor da Luísa</div><div class="fs-value">${stats.luisa}</div></div>
        <div class="final-stat"><div class="fs-icon">🎩</div><div class="fs-label">Dignidade</div><div class="fs-value">${stats.dignity}</div></div>
      </div>
      <div class="extra-stats">
        📊 <strong>Relatório do Dia:</strong><br>
        ☕ Borras de café criadas: ${stats.coffee} (e contando)<br>
        💬 Mensagens ignoradas: ~47<br>
        📋 Vezes que ouviu "modelo de negócios": ∞<br>
        🔧 Gasto no mecânico: incalculável<br>
        🙂 Emojis passivo-agressivos recebidos: pelo menos 3<br>
        🍦 Picolés de panetone merecidos: todos
      </div>
      <button class="intro-btn show" onclick="renderScene('birthday')" style="margin-top:16px;">Continuar...</button>
    </div>
  `;
}

function renderScene_original(sceneId) { renderScene(sceneId); }

const _origRender = renderScene;
renderScene = function(sceneId) {
  if (sceneId === 'birthday') {
    renderBirthday();
    return;
  }
  _origRender(sceneId);
};

function renderBirthday() {
  document.getElementById('stats-bar').classList.remove('visible');
  const container = document.getElementById('scene-container');

  // Confetti
  const confettiContainer = document.createElement('div');
  confettiContainer.className = 'confetti-container';
  const emojis = ['🎉','🎊','🥳','🎂','✨','🍦','☕','💍'];
  for (let i = 0; i < 30; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.textContent = emojis[i % emojis.length];
    piece.style.left = Math.random() * 100 + '%';
    piece.style.animationDuration = (3 + Math.random() * 4) + 's';
    piece.style.animationDelay = Math.random() * 3 + 's';
    piece.style.fontSize = (18 + Math.random() * 16) + 'px';
    confettiContainer.appendChild(piece);
  }
  document.body.appendChild(confettiContainer);

  container.innerHTML = `
    <div class="scene-card" style="text-align:center;">
      <div class="scene-emoji">🎂</div>
      <div class="scene-title">Feliz Aniversário, Arthur!</div>
      <div class="birthday-msg" style="text-align:left;">
        <p>Seu dia a dia pode ser caótico — entre borra de café, Lovable, brigas pra mediar, casamento pra planejar e modelos de negócio pra fingir que entendeu.</p>
        <p>Mas a real é que a Allos não seria a mesma sem você. A comunicação, as ideias, a energia — tudo isso tem a sua marca (e um pouco de borra de café).</p>
        <p>Que esse novo ano traga menos Lovable, mais picolé de panetone, e uma pia limpinha (a gente pode sonhar).</p>
        <p>Com carinho de toda a equipe! 💜</p>
      </div>
      <button class="replay-btn" onclick="restartGame()">🔄 Jogar de novo</button>
    </div>
  `;
}

function restartGame() {
  stats.stress = 3;
  stats.coffee = 2;
  stats.luisa = 5;
  stats.dignity = 5;
  sceneCount = 0;
  document.querySelectorAll('.confetti-container').forEach(el => el.remove());
  renderScene('intro');
}

// Start
renderScene('intro');
