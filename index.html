<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador: Um Dia na Vida do Arthur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@twemoji/api@latest/dist/twemoji.min.js" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0f172a;
  min-height: 100vh;
  font-family: 'DM Sans', system-ui, -apple-system, 'Segoe UI', sans-serif;
  color: #e2e8f0;
  display: flex;
  justify-content: center;
  padding: 16px;
  overflow-x: hidden;
  position: relative;
}

/* Animated background */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse 600px 600px at 20% 20%, rgba(99, 102, 241, 0.12) 0%, transparent 70%),
    radial-gradient(ellipse 500px 500px at 80% 80%, rgba(139, 92, 246, 0.10) 0%, transparent 70%),
    radial-gradient(ellipse 400px 400px at 50% 50%, rgba(67, 56, 202, 0.06) 0%, transparent 70%),
    linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
  z-index: -2;
  animation: bgShift 12s ease-in-out infinite alternate;
}

@keyframes bgShift {
  0% { opacity: 1; }
  50% { opacity: 0.85; }
  100% { opacity: 1; }
}

/* Subtle floating particles */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    radial-gradient(1px 1px at 10% 30%, rgba(255,255,255,0.15) 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,0.1) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 50% 20%, rgba(255,255,255,0.12) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,0.08) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,0.1) 0%, transparent 100%);
  z-index: -1;
  animation: starsTwinkle 8s ease-in-out infinite alternate;
}

@keyframes starsTwinkle {
  0% { opacity: 0.5; }
  100% { opacity: 1; }
}

/* Twemoji sizing */
img.emoji {
  height: 1em;
  width: 1em;
  margin: 0 .05em 0 .1em;
  vertical-align: -0.1em;
  display: inline;
}

#app {
  width: 100%;
  max-width: 520px;
  padding-bottom: 40px;
}

/* STATS BAR */
#stats-bar {
  position: sticky;
  top: 8px;
  z-index: 50;
  background: rgba(15, 23, 42, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 18px;
  padding: 14px 16px;
  margin-bottom: 20px;
  display: none;
  gap: 8px;
  flex-wrap: wrap;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04);
}

#stats-bar.visible {
  display: flex;
}

.stat {
  flex: 1 1 45%;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 500;
  padding: 8px 12px;
  border-radius: 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}

.stat::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  opacity: 0;
  transition: opacity 0.4s;
  border-radius: 12px;
}

.stat .stat-icon {
  font-size: 20px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
}

.stat .stat-icon img.emoji {
  height: 20px;
  width: 20px;
}

.stat .stat-label { color: #94a3b8; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.stat .stat-value {
  margin-left: auto;
  font-weight: 700;
  font-size: 16px;
  color: #a5b4fc;
  text-shadow: 0 0 12px rgba(129, 140, 248, 0.4);
  transition: all 0.3s;
}

.stat.flash-up {
  background: rgba(74, 222, 128, 0.12);
  border-color: rgba(74, 222, 128, 0.3);
  box-shadow: 0 0 20px rgba(74, 222, 128, 0.15);
}
.stat.flash-up .stat-value { color: #4ade80; text-shadow: 0 0 12px rgba(74, 222, 128, 0.5); }

.stat.flash-down {
  background: rgba(248, 113, 113, 0.12);
  border-color: rgba(248, 113, 113, 0.3);
  box-shadow: 0 0 20px rgba(248, 113, 113, 0.15);
}
.stat.flash-down .stat-value { color: #f87171; text-shadow: 0 0 12px rgba(248, 113, 113, 0.5); }

/* SCENE CARD */
.scene-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 24px;
  padding: 32px 24px;
  animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow:
    0 4px 24px rgba(0,0,0,0.2),
    0 1px 0 rgba(255,255,255,0.04) inset;
  position: relative;
  overflow: hidden;
}

.scene-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(129, 140, 248, 0.3), transparent);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(24px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.scene-emoji {
  font-size: 56px;
  text-align: center;
  margin-bottom: 20px;
  animation: emojiFloat 3s ease-in-out infinite;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
  display: flex;
  justify-content: center;
  align-items: center;
}

.scene-emoji img.emoji {
  height: 56px;
  width: 56px;
}

@keyframes emojiFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.scene-title {
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  font-size: 20px;
  text-align: center;
  margin-bottom: 6px;
  color: #f1f5f9;
  letter-spacing: -0.3px;
}

.scene-subtitle {
  text-align: center;
  color: #818cf8;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 3px;
  font-weight: 600;
  margin-bottom: 24px;
  text-shadow: 0 0 20px rgba(129, 140, 248, 0.3);
}

.scene-text {
  font-size: 15px;
  line-height: 1.75;
  color: #cbd5e1;
  margin-bottom: 28px;
  min-height: 60px;
  white-space: pre-line;
  cursor: pointer;
}

.scene-text .cursor {
  display: inline;
  color: #818cf8;
  animation: blink 0.6s step-end infinite;
  text-shadow: 0 0 8px rgba(129, 140, 248, 0.6);
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* CHOICES */
.choices { display: flex; flex-direction: column; gap: 10px; }

.choice-btn {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 15px 20px;
  color: #e2e8f0;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  text-align: left;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  opacity: 0;
  transform: translateY(16px);
  position: relative;
  overflow: hidden;
}

.choice-btn::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(180deg, #818cf8, #6366f1);
  opacity: 0;
  transition: opacity 0.3s;
  border-radius: 0 2px 2px 0;
}

.choice-btn.show {
  opacity: 1;
  transform: translateY(0);
}

.choice-btn:hover, .choice-btn:focus {
  transform: translateX(6px);
  border-color: rgba(129, 140, 248, 0.3);
  background: rgba(129, 140, 248, 0.08);
  box-shadow: 0 4px 20px rgba(99, 102, 241, 0.15);
}

.choice-btn:hover::before, .choice-btn:focus::before {
  opacity: 1;
}

.choice-btn:active {
  transform: translateX(6px) scale(0.98);
}

.choice-btn img.emoji {
  height: 1.1em;
  width: 1.1em;
  vertical-align: -0.15em;
}

/* INTRO SPECIAL */
.intro-btn {
  display: block;
  margin: 0 auto;
  background: linear-gradient(135deg, #6366f1, #8b5cf6, #6366f1);
  background-size: 200% 200%;
  animation: gradientMove 3s ease infinite;
  border: none;
  border-radius: 16px;
  padding: 18px 36px;
  color: #fff;
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  opacity: 0;
  transform: translateY(16px);
  box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
  position: relative;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.intro-btn.show {
  opacity: 1;
  transform: translateY(0);
}

.intro-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 40px rgba(99, 102, 241, 0.5);
}

.intro-btn:active {
  transform: translateY(-1px);
}

/* NOTIFICATIONS */
#notification-area {
  position: fixed;
  top: 12px;
  right: 12px;
  z-index: 100;
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-width: 280px;
}

.notification {
  background: rgba(15, 23, 42, 0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 12px 16px;
  font-size: 13px;
  color: #e2e8f0;
  animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1), fadeOut 0.4s ease 2.2s forwards;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.05);
}

.notification .notif-icon {
  font-size: 22px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
}

.notification .notif-icon img.emoji { height: 22px; width: 22px; }

.notification .notif-text { line-height: 1.4; }
.notification .notif-app {
  font-size: 10px;
  color: #818cf8;
  display: block;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 1px;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(100px) scale(0.9); }
  to { opacity: 1; transform: translateX(0) scale(1); }
}

@keyframes fadeOut {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(-8px); pointer-events: none; }
}

/* FINAL SCREEN */
.final-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin: 24px 0;
}

.final-stat {
  flex: 1 1 45%;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 16px;
  padding: 16px;
  text-align: center;
  transition: all 0.3s;
}

.final-stat:hover {
  background: rgba(255,255,255,0.05);
  border-color: rgba(129, 140, 248, 0.2);
}

.final-stat .fs-icon {
  font-size: 32px;
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 4px;
}

.final-stat .fs-icon img.emoji { height: 32px; width: 32px; }

.final-stat .fs-label { font-size: 11px; color: #94a3b8; margin: 4px 0; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.final-stat .fs-value {
  font-size: 24px;
  font-weight: 700;
  color: #a5b4fc;
  text-shadow: 0 0 16px rgba(129, 140, 248, 0.4);
}

.extra-stats {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 16px;
  padding: 20px;
  margin: 20px 0;
  font-size: 13px;
  color: #94a3b8;
  line-height: 2;
}

.extra-stats img.emoji { height: 1.1em; width: 1.1em; }

.rank-emoji {
  font-size: 72px;
  text-align: center;
  margin-bottom: 12px;
  display: flex;
  justify-content: center;
  filter: drop-shadow(0 4px 20px rgba(0,0,0,0.3));
}
.rank-emoji img.emoji { height: 72px; width: 72px; }

.rank-title {
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  font-size: 24px;
  text-align: center;
  margin-bottom: 4px;
  background: linear-gradient(135deg, #e2e8f0, #a5b4fc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.rank-subtitle {
  text-align: center;
  color: #64748b;
  font-size: 13px;
  margin-bottom: 24px;
  font-weight: 500;
}

/* BIRTHDAY CARD */
.confetti-container {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 200;
  overflow: hidden;
}

.confetti-piece {
  position: absolute;
  top: -50px;
  animation: confettiFall linear infinite;
}

.confetti-piece img.emoji { height: 28px; width: 28px; }

@keyframes confettiFall {
  0% { transform: translateY(-50px) rotate(0deg) scale(1); opacity: 1; }
  80% { opacity: 0.8; }
  100% { transform: translateY(110vh) rotate(720deg) scale(0.6); opacity: 0; }
}

.birthday-msg {
  background: linear-gradient(135deg, rgba(129, 140, 248, 0.06), rgba(139, 92, 246, 0.06));
  border: 1px solid rgba(129, 140, 248, 0.15);
  border-radius: 20px;
  padding: 24px;
  font-size: 15px;
  line-height: 1.85;
  color: #cbd5e1;
  margin: 24px 0;
  position: relative;
}

.birthday-msg::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(129, 140, 248, 0.4), transparent);
}

.birthday-msg p { margin-bottom: 14px; }
.birthday-msg p:last-child { margin-bottom: 0; }

.replay-btn {
  display: block;
  margin: 24px auto 0;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 16px 32px;
  color: #e2e8f0;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.replay-btn:hover {
  border-color: rgba(129, 140, 248, 0.3);
  background: rgba(129, 140, 248, 0.08);
  box-shadow: 0 4px 20px rgba(99, 102, 241, 0.15);
  transform: translateY(-2px);
}

/* Divider */
.scene-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
  margin: 20px 0;
}
</style>
</head>
<body>
<div id="notification-area"></div>
<div id="app">
  <div id="stats-bar">
    <div class="stat" id="stat-stress">
      <span class="stat-icon">😰</span>
      <span class="stat-label">Estresse</span>
      <span class="stat-value" id="val-stress">3</span>
    </div>
    <div class="stat" id="stat-coffee">
      <span class="stat-icon">☕</span>
      <span class="stat-label">Borras</span>
      <span class="stat-value" id="val-coffee">2</span>
    </div>
    <div class="stat" id="stat-luisa">
      <span class="stat-icon">💍</span>
      <span class="stat-label">Luisa</span>
      <span class="stat-value" id="val-luisa">5</span>
    </div>
    <div class="stat" id="stat-dignity">
      <span class="stat-icon">🎩</span>
      <span class="stat-label">Dignidade</span>
      <span class="stat-value" id="val-dignity">5</span>
    </div>
  </div>
  <div id="scene-container"></div>
</div>

<script>
// Parse all existing emojis to Twemoji SVGs
function parseEmojis(el) {
  if (typeof twemoji !== 'undefined') {
    twemoji.parse(el || document.body, {
      folder: 'svg',
      ext: '.svg',
      base: 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/'
    });
  }
}

const stats = { stress: 3, coffee: 2, luisa: 5, dignity: 5 };
let currentScene = 'intro';
let typewriterTimer = null;
let sceneCount = 0;

const notifications = [
  { icon: '💍', app: 'WhatsApp', text: 'Luisa: "amor vc viu minha msg?"' },
  { icon: '🔧', app: 'WhatsApp', text: 'Mecanico: "chefe, liga pra mim qnd puder"' },
  { icon: '👰', app: 'WhatsApp', text: 'Sogra: "Arthur querido, precisamos conversar"' },
  { icon: '💬', app: 'Slack', text: '#geral: "@Arthur vc viu aquilo?"' },
  { icon: '💍', app: 'WhatsApp', text: 'Luisa: "???"' },
  { icon: '🔧', app: 'WhatsApp', text: 'Mecanico: "achei mais uma coisa aqui 😬"' },
  { icon: '👰', app: 'WhatsApp', text: 'Sogra: "manda foto da pia pra eu ver"' },
  { icon: '💬', app: 'Slack', text: 'Alan: "Lucas ta errado e eu provo"' },
  { icon: '💍', app: 'WhatsApp', text: 'Luisa: "ta vivo?"' },
  { icon: '📋', app: 'Slack', text: 'Lucas: "Alan nao entendeu NADA"' },
  { icon: '💍', app: 'WhatsApp', text: 'Luisa: "ok 🙂"' },
  { icon: '🔧', app: 'WhatsApp', text: 'Mecanico: "o orcamento subiu um pouquinho"' },
];

function showNotification() {
  const n = notifications[Math.floor(Math.random() * notifications.length)];
  const area = document.getElementById('notification-area');
  const el = document.createElement('div');
  el.className = 'notification';
  el.innerHTML = `<span class="notif-icon">${n.icon}</span><span class="notif-text"><span class="notif-app">${n.app}</span>${n.text}</span>`;
  area.appendChild(el);
  parseEmojis(el);
  setTimeout(() => el.remove(), 2800);
}

function changeStat(key, delta) {
  stats[key] += delta;
  const valEl = document.getElementById('val-' + key);
  const statEl = document.getElementById('stat-' + key);
  valEl.textContent = stats[key];
  const cls = delta > 0 && (key === 'stress' || key === 'coffee') ? 'flash-down'
            : delta < 0 && (key === 'stress' || key === 'coffee') ? 'flash-up'
            : delta > 0 ? 'flash-up' : 'flash-down';
  statEl.classList.add(cls);
  setTimeout(() => statEl.classList.remove(cls), 700);
}

function applyEffects(effects) {
  if (!effects) return;
  for (const [key, val] of Object.entries(effects)) {
    changeStat(key, val);
  }
}

function typewriter(el, text, cb) {
  let i = 0;
  let skipped = false;
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  cursor.textContent = '\u258A';

  function type() {
    if (skipped) return;
    if (i < text.length) {
      el.textContent = text.slice(0, i + 1);
      el.appendChild(cursor);
      i++;
      typewriterTimer = setTimeout(type, 14);
    } else {
      cursor.remove();
      el.textContent = text;
      parseEmojis(el);
      if (cb) cb();
    }
  }

  function skip() {
    skipped = true;
    clearTimeout(typewriterTimer);
    el.textContent = text;
    cursor.remove();
    parseEmojis(el);
    el.removeEventListener('click', skip);
    if (cb) cb();
  }

  el.addEventListener('click', skip);
  type();
}

function showChoices(container, choices) {
  const wrap = document.createElement('div');
  wrap.className = 'choices';
  choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.label;
    parseEmojis(btn);
    btn.onclick = () => {
      applyEffects(c.effects);
      if (c.next) {
        renderScene(c.next);
      }
    };
    wrap.appendChild(btn);
    setTimeout(() => btn.classList.add('show'), 100 * (i + 1));
  });
  container.appendChild(wrap);
}

const scenes = {
  intro: {
    emoji: '🎮',
    title: 'SIMULADOR',
    subtitle: 'Um Dia na Vida do Arthur',
    text: 'Voce e Arthur. Esta prestes a casar, trabalha na Allos, e tem uma relacao complicada com a limpeza. Sobreviva a um dia inteiro sem perder a sanidade.\n\nBoa sorte. Voce vai precisar.',
    showStats: false,
    introBtn: true,
    next: 'morning',
  },

  morning: {
    emoji: '⏰',
    title: '06:47 \u2014 O Despertar',
    text: 'O despertador toca. Voce se arrasta ate a cozinha. A pia te recebe com camadas arqueologicas de borra de cafe. De ontem, de anteontem, e possivelmente de 2019.\n\nA borra te olha de volta. Com julgamento.',
    choices: [
      {
        label: '🧽 Limpar a borra agora',
        effects: { coffee: 1 },
        next: 'morning_clean',
      },
      {
        label: '☕ Fazer mais cafe (gerando mais borra)',
        effects: { coffee: 2 },
        next: 'morning_morecoffee',
      },
      {
        label: '🙈 Fingir que nao viu',
        effects: { dignity: -1, luisa: -1 },
        next: 'morning_ignore',
      },
    ],

function renderScene(sceneId) {
  currentScene = sceneId;
  sceneCount++;
  const scene = scenes[sceneId];
  const container = document.getElementById('scene-container');
  const statsBar = document.getElementById('stats-bar');

  if (sceneId === 'results') { renderResults(); return; }
  if (sceneId === 'birthday') { renderBirthday(); return; }

  if (scene.showStats === false) {
    statsBar.classList.remove('visible');
  } else {
    statsBar.classList.add('visible');
  }

  // Notifications every 2-3 scenes
  if (sceneCount > 2 && sceneCount % 2 === 0) {
    setTimeout(showNotification, 800 + Math.random() * 1500);
  }

  container.innerHTML = '';
  const card = document.createElement('div');
  card.className = 'scene-card';

  const emojiEl = document.createElement('div');
  emojiEl.className = 'scene-emoji';
  emojiEl.textContent = scene.emoji;
  card.appendChild(emojiEl);

  const titleEl = document.createElement('div');
  titleEl.className = 'scene-title';
  titleEl.textContent = scene.title;
  card.appendChild(titleEl);

  if (scene.subtitle) {
    const subEl = document.createElement('div');
    subEl.className = 'scene-subtitle';
    subEl.textContent = scene.subtitle;
    card.appendChild(subEl);
  }

  const textEl = document.createElement('div');
  textEl.className = 'scene-text';
  card.appendChild(textEl);

  container.appendChild(card);
  parseEmojis(card);

  typewriter(textEl, scene.text, () => {
    if (scene.introBtn) {
      const btn = document.createElement('button');
      btn.className = 'intro-btn';
      btn.innerHTML = '&#9654; INICIAR SIMULACAO';
      btn.onclick = () => renderScene(scene.next);
      card.appendChild(btn);
      setTimeout(() => btn.classList.add('show'), 100);
    } else if (scene.choices) {
      showChoices(card, scene.choices);
    }
  });
}

function renderResults() {
  document.getElementById('stats-bar').classList.remove('visible');
  const container = document.getElementById('scene-container');

  const score = stats.dignity + stats.luisa - stats.stress - stats.coffee;
  let rankEmoji, rankTitle;
  if (score <= -20) { rankEmoji = '💀'; rankTitle = 'Desastre Ambulante'; }
  else if (score <= -10) { rankEmoji = '🩹'; rankTitle = 'Sobrevivente Acidental'; }
  else if (score <= -3) { rankEmoji = '😅'; rankTitle = 'Arthur Medio'; }
  else if (score <= 2) { rankEmoji = '⭐'; rankTitle = 'Arthur Premium'; }
  else { rankEmoji = '👑'; rankTitle = 'Arthur Lendario'; }

  container.innerHTML = `
    <div class="scene-card">
      <div class="rank-emoji">${rankEmoji}</div>
      <div class="rank-title">${rankTitle}</div>
      <div class="rank-subtitle">Score total: ${score}</div>
      <div class="final-stats">
        <div class="final-stat"><div class="fs-icon">😰</div><div class="fs-label">Estresse</div><div class="fs-value">${stats.stress}</div></div>
        <div class="final-stat"><div class="fs-icon">☕</div><div class="fs-label">Borras de Cafe</div><div class="fs-value">${stats.coffee}</div></div>
        <div class="final-stat"><div class="fs-icon">💍</div><div class="fs-label">Humor da Luisa</div><div class="fs-value">${stats.luisa}</div></div>
        <div class="final-stat"><div class="fs-icon">🎩</div><div class="fs-label">Dignidade</div><div class="fs-value">${stats.dignity}</div></div>
      </div>
      <div class="extra-stats">
        📊 <strong>Relatorio do Dia:</strong><br>
        ☕ Borras de cafe criadas: ${stats.coffee} (e contando)<br>
        💬 Mensagens ignoradas: ~47<br>
        📋 Vezes que ouviu "modelo de negocios": \u221E<br>
        🔧 Gasto no mecanico: incalculavel<br>
        🙂 Emojis passivo-agressivos recebidos: pelo menos 3<br>
        🍦 Picoles de panetone merecidos: todos
      </div>
      <button class="intro-btn show" onclick="renderScene('birthday')" style="margin-top:16px;">Continuar...</button>
    </div>
  `;
  parseEmojis(container);
}

function renderBirthday() {
  document.getElementById('stats-bar').classList.remove('visible');
  const container = document.getElementById('scene-container');

  // Confetti
  document.querySelectorAll('.confetti-container').forEach(el => el.remove());
  const confettiContainer = document.createElement('div');
  confettiContainer.className = 'confetti-container';
  const emojis = ['🎉','🎊','🥳','🎂','✨','🍦','☕','💍'];
  for (let i = 0; i < 35; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.textContent = emojis[i % emojis.length];
    piece.style.left = Math.random() * 100 + '%';
    piece.style.animationDuration = (4 + Math.random() * 5) + 's';
    piece.style.animationDelay = Math.random() * 4 + 's';
    piece.style.fontSize = (20 + Math.random() * 18) + 'px';
    confettiContainer.appendChild(piece);
  }
  document.body.appendChild(confettiContainer);
  parseEmojis(confettiContainer);

  container.innerHTML = `
    <div class="scene-card" style="text-align:center;">
      <div class="scene-emoji">🎂</div>
      <div class="scene-title">Feliz Aniversario, Arthur!</div>
      <div class="birthday-msg" style="text-align:left;">
        <p>Seu dia a dia pode ser caotico \u2014 entre borra de cafe, Lovable, brigas pra mediar, casamento pra planejar e modelos de negocio pra fingir que entendeu.</p>
        <p>Mas a real e que a Allos nao seria a mesma sem voce. A comunicacao, as ideias, a energia \u2014 tudo isso tem a sua marca (e um pouco de borra de cafe).</p>
        <p>Que esse novo ano traga menos Lovable, mais picole de panetone, e uma pia limpinha (a gente pode sonhar).</p>
        <p>Com carinho de toda a equipe! 💜</p>
      </div>
      <button class="replay-btn" onclick="restartGame()">🔄 Jogar de novo</button>
    </div>
  `;
  parseEmojis(container);
}

function restartGame() {
  stats.stress = 3;
  stats.coffee = 2;
  stats.luisa = 5;
  stats.dignity = 5;
  sceneCount = 0;
  document.querySelectorAll('.confetti-container').forEach(el => el.remove());
  document.getElementById('val-stress').textContent = '3';
  document.getElementById('val-coffee').textContent = '2';
  document.getElementById('val-luisa').textContent = '5';
  document.getElementById('val-dignity').textContent = '5';
  renderScene('intro');
}

// Initial parse & start
parseEmojis(document.getElementById('stats-bar'));
renderScene('intro');
